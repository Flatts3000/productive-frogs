# Productive Frogs — access transformers
#
# Each line opens up access to a vanilla member that the mod needs to override
# or read directly. Keep this list small; every entry is a coupling to vanilla
# internals and must be justified in the comment above it.

# Tadpole.ageUp() is the private method that fires when the tadpole's age hits
# ticksToBeFrog and converts it into a vanilla Frog. ResourceTadpole overrides
# it to convert into a ResourceFrog of the matching category instead. Without
# this AT, we'd need a fresh entity that duplicates ~150 lines of vanilla
# Tadpole behavior — exposing this one method preserves the "stay close to
# vanilla" principle.
public net.minecraft.world.entity.animal.frog.Tadpole ageUp()V
