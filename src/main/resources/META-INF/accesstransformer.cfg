# Productive Frogs — access transformers
#
# Each line opens up access to a vanilla member that the mod needs to override
# or read directly. Keep this list small; every entry is a coupling to vanilla
# internals and must be justified in the comment above it.

# Tadpole.ageUp() is the private method that fires when the tadpole's age hits
# ticksToBeFrog and converts it into a vanilla Frog. ResourceTadpole overrides
# it to convert into a ResourceFrog of the matching category instead. Without
# this AT, we'd need a fresh entity that duplicates ~150 lines of vanilla
# Tadpole behavior — exposing this one method preserves the "stay close to
# vanilla" principle.
public net.minecraft.world.entity.animal.frog.Tadpole ageUp()V

# Tadpole.age is the private per-tick growth counter (matures at the public
# static ticksToBeFrog, 24000). ResourceTadpole overrides aiStep() to add extra
# age per tick so its maturation honors the config-exposed tadpoleGrowthTicks
# (faster than vanilla), without touching the shared static (vanilla tadpoles
# keep stock pacing). Reading + writing the field is the surgical way to do this.
public net.minecraft.world.entity.animal.frog.Tadpole age

# FrogAi.getActivities() is the protected-static activity supplier vanilla's
# Brain.Provider feeds the frog brain (26.1 model: activities are declared
# up-front as a List<ActivityData<Frog>>, not mutated after the fact). ResourceFrog
# builds its own Brain.Provider with two swapped sensors + the extra
# HAS_HUNTING_COOLDOWN memory, and an activity supplier that augments this list
# (same-species AnimalMakeLove in IDLE/SWIM, category lay behavior in LAY_SPAWN).
# Exposing this one method lets us inherit every other vanilla activity verbatim
# instead of re-hardcoding the whole frog brain. (The 1.21.1 SENSOR_TYPES /
# MEMORY_TYPES fields this once read are gone - vanilla inlines the sensor list in
# its static provider now.)
public net.minecraft.world.entity.animal.frog.FrogAi getActivities()Ljava/util/List;
