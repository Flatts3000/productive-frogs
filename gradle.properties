org.gradle.jvmargs=-Xmx2G
org.gradle.daemon=true
org.gradle.parallel=true

# -----------------------------------------------------------------------------
# Mod metadata — referenced from build.gradle and neoforge.mods.toml
# -----------------------------------------------------------------------------
mod_id=productivefrogs
mod_name=Productive Frogs
mod_version=1.0.0
mod_license=MIT
mod_group_id=com.flatts.productivefrogs
mod_authors=Flatts3000
mod_description=Six frog species farm resources from their matching slimes. Infuse a wild slime with an iron ingot to get an Iron Slime, feed it to a Cave Frog, collect the Iron Froglight that drops, smelt it back to iron. Sustained via the Slime Milker and themed Slime Milk fluids — no power, no pipes, no multiblocks. Data-driven variants: modpacks add new resources with JSON, no Java required.

